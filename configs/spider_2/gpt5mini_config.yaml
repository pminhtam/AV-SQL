rephrase_agent:
  model_name: 'gpt-5-mini'
  temperature: 1.0
  template_path: './prompt_templates/rephrase_question.txt'
  ####
  num_incontext_shot: 2
  incontext_shot_folder_path: './prompt_templates/examples/examples_rephrase_question'

cte_agent:
  model_name: 'gpt-5-mini'
  temperature: 1.0
  n_shots: 3  # number of in-context examples
  max_tokens: 4096
  template_path: './prompt_templates/schema_linking_cte_macsql.txt'
  json_type: "multi_table_macsql" # "single_table_chess", "multi_table_macsql" depend on template
  prompt_type: "compact"  # "full", "compress_columns", "compress_tables", "compact"
  max_fix_attempt: 5
  run_type: "sequential" # "sequential" or "independent" # not use yet

  stream: True # stream in llm calling
  ####
  is_use_col_desc: True
  is_use_sample_rows: True
  num_incontext_shot: 2
  incontext_shot_folder_path: './prompt_templates/examples/example_schema_linking_cte_macsql'

planner_agent:  # cconfig for PlannerAgent
  model_name: 'gpt-5-mini'
  temperature: 1.0
  max_tokens: 4096
  template_path: './prompt_templates/planning.txt'

revise_sql:  # cconfig for reviseSQL
  model_name: 'gpt-5-mini'
  temperature: 1.0
  max_tokens: 2048
  template_path: './prompt_templates/revise.txt'

sql_agent:
  model_name: 'gpt-5-mini'
  temperature: 1.0
  max_tokens: 4096
  template_path: './prompt_templates/zero_shot_with_schemalinking.txt'
  prompt_type: "compact"
  max_fix_attempt: 5

  is_use_col_desc: True
  is_use_sample_rows: True
  stream: True # stream in llm calling


