setting_name: gpt5mini

is_continue_run: True

data_file_path: 'av_sql_preprocessed_data/spider2-snow/spider2-snow.jsonl'
table_file_path: 'av_sql_preprocessed_data/spider2-snow/tables_preprocessed_step2_group_columns_with_example_values.json'
external_knowledge_folder_path: "../Spider2/spider2-snow/resource/documents/"

dataset_name: "spider2"

n_runs : 1  #
n_processes: 2


# SqlExecEnv
snowflake_credential_path: "../Spider2DecomposeQuestion2SQL/oop_cot/configs/snowflake_credential_bk.json"
bigquery_credential_path: "../Spider2DecomposeQuestion2SQL/oop_cot/configs/bigquery_credential.json"
sqlite_root_dir: ""


log_dir: "logs/spider2_snow_gpt5mini/"  #

schema_split_type : "prompting_size_limit" # "one_table", "foreign_key", "prompting_size_limit"
schema_part_token_limit : 80000 # max tokens for each part when splitting schema

is_use_sample_rows: True

